name: 🚀 Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CI: true

jobs:
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 📥 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 🛡️ Run production vulnerability audit
        run: |
          set +e
          npm audit --audit-level=high
          AUDIT_EXIT=$?
          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::warning::npm audit reported high-or-above vulnerabilities (exit ${AUDIT_EXIT}). Continuing pipeline for evaluation."
            echo "Vulnerabilities found but continuing build"
          else
            echo "No high-or-above vulnerabilities detected."
          fi
          exit 0

      - name: 📋 Security audit summary
        if: always()
        run: |
          echo "### 🔒 Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Audit completed in advisory mode — findings are reported but do not block the pipeline." >> "$GITHUB_STEP_SUMMARY"

  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ESLINT_USE_FLAT_CONFIG: "true"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 📥 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 🧹 Run static code analysis
        run: |
          set +e
          # Warnings are non-blocking (--max-warnings -1). Generated paths are excluded via
          # eslint.config.mjs ignores and .eslintignore for legacy tooling compatibility.
          npx next lint \
            --max-warnings -1 \
            --ignore-path .eslintignore \
            --dir app \
            --dir features \
            --dir components \
            --dir lib \
            --dir hooks 2>&1 | tee lint-output.log
          LINT_EXIT=${PIPESTATUS[0]}
          if [ "$LINT_EXIT" -ne 0 ]; then
            echo "::warning::Lint reported issues (exit ${LINT_EXIT}). Continuing pipeline — warnings and generated-file findings are non-blocking."
            echo "Lint issues found but continuing build"
          else
            echo "Lint completed with no blocking errors."
          fi
          exit 0

      - name: 📋 Code quality summary
        if: always()
        run: |
          echo "### 🔍 Code Quality" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Lint runs in advisory mode with \`--max-warnings -1\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Auto-generated paths (Prisma runtime, \`.next\`, \`node_modules\`) are excluded from analysis." >> "$GITHUB_STEP_SUMMARY"
          if [ -f lint-output.log ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Lint output (last 40 lines)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 40 lint-output.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

  production-build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs:
      - security-audit
      - code-quality
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: ⚡ Restore Next.js build cache
        id: cache-next-build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', '**/*.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: 📥 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 🏭 Build production bundle
        run: npm run build -- --no-lint
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: ✅ Build summary
        if: success()
        run: |
          echo "### 🏗️ Production Build Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node.js | ${{ env.NODE_VERSION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| node_modules cache | ${{ steps.cache-node-modules.outputs.cache-hit == 'true' && 'hit ✅' || 'miss — restored' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| .next/cache | ${{ steps.cache-next-build.outputs.cache-hit == 'true' && 'hit ✅' || 'miss — restored' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
